<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f766e">
  <meta http-equiv="cache-control" content="no-cache">
  <meta http-equiv="pragma" content="no-cache">
  <title>中古せどり シンプル仕入れリスト</title>
  <style>
    :root {
      --bg: #f5f6f7;
      --card: #fff;
      --ink: #1f2933;
      --muted: #6b7280;
      --line: #dde3ea;
      --accent: #0f766e;
      --header-bg: rgba(245, 246, 247, .96);
      --field-bg: #fff;
      --memo-bg: #fbfcfd;
      --profit-bg: #f1fbf8;
      --profit-line: #cfe8e3;
      --item-line: #edf1f4;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111827;
        --card: #1f2937;
        --ink: #f3f4f6;
        --muted: #9ca3af;
        --line: #374151;
        --accent: #14b8a6;
        --header-bg: rgba(17, 24, 39, .96);
        --field-bg: #111827;
        --memo-bg: #111827;
        --profit-bg: #0f2e2a;
        --profit-line: #1f4d46;
        --item-line: #2b3544;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--header-bg);
      border-bottom: 1px solid var(--line);
      padding: 10px 12px 8px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 16px;
      letter-spacing: 0;
    }
    input[type="search"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 16px;
      background: var(--field-bg);
      color: var(--ink);
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 6px;
    }
    .updated {
      color: var(--muted);
      font-size: 12px;
    }
    .toolbar-buttons {
      display: flex;
      gap: 6px;
    }
    button {
      border: 1px solid var(--accent);
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 800;
    }
    button.ghost {
      background: transparent;
      color: var(--accent);
    }
    .chips {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      margin-top: 8px;
      padding-bottom: 2px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .chips::-webkit-scrollbar { display: none; }
    .chip {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--card);
      color: var(--ink);
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 600;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 12px;
    }
    section {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    summary {
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 13px 14px;
      font-weight: 800;
      font-size: 17px;
    }
    summary::-webkit-details-marker { display: none; }
    summary::after {
      content: "▸";
      color: var(--muted);
      font-size: 14px;
    }
    details[open] summary::after { content: "▾"; }
    .count {
      margin-left: auto;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
    }
    .count.has { color: var(--accent); }
    .items {
      border-top: 1px solid var(--line);
      padding: 8px 12px 12px;
    }
    .corner-profit {
      border: 1px solid var(--profit-line);
      border-radius: 8px;
      background: var(--profit-bg);
      padding: 10px;
      margin: 2px 0 8px;
    }
    .corner-profit-title {
      color: var(--accent);
      font-size: 13px;
      font-weight: 900;
      margin: 0 0 6px;
    }
    .corner-profit-body {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      font-size: 14px;
      white-space: pre-wrap;
    }
    label {
      display: grid;
      grid-template-columns: 24px 1fr;
      gap: 8px;
      padding: 9px 0;
      border-bottom: 1px solid var(--item-line);
    }
    label:last-of-type { border-bottom: 0; }
    label.done { opacity: .5; }
    label.done .brand { text-decoration: line-through; }
    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin: 2px 0 0;
      accent-color: var(--accent);
    }
    .brand {
      display: block;
      font-weight: 800;
      font-size: 16px;
    }
    .note {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
    }
    textarea {
      width: 100%;
      min-height: 54px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      margin-top: 8px;
      font: inherit;
      font-size: 14px;
      background: var(--memo-bg);
      color: var(--ink);
    }
    textarea::placeholder {
      color: #9aa3ad;
    }
    .no-hit {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      padding: 24px 0;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <header id="header">
    <h1>中古せどり シンプル仕入れリスト</h1>
    <input id="search" type="search" placeholder="例: ゴルフ キャロウェイ ナイキ SONY">
    <div class="toolbar">
      <span id="updated" class="updated"></span>
      <div class="toolbar-buttons">
        <button id="reset" type="button" class="ghost">チェック全消し</button>
        <button id="refresh" type="button">更新</button>
      </div>
    </div>
    <nav id="chips" class="chips" aria-label="コーナーへ移動"></nav>
  </header>

  <main>
    <section>
      <details open>
        <summary>ゴルフクラブ</summary>
        <div class="items">
          <label><input type="checkbox"><span><span class="brand">キャロウェイ(Callaway)</span><span class="note">EPIC / MAVRIK / ROGUE / PARADYM。ドライバー・フェアウェイウッド優先。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">テーラーメイド(TaylorMade)</span><span class="note">SIM / Stealth / Mシリーズ。ヘッド割れ・シャフト傷を見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">ピン(PING)</span><span class="note">Gシリーズ。ドライバー、アイアンセット、パターを見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">スコッティキャメロン(Scotty Cameron)</span><span class="note">パター最優先。カバー付きなら相場確認。</span></span></label>
        </div>
      </details>
    </section>

    <section>
      <details open>
        <summary>スニーカー・靴</summary>
        <div class="items">
          <label><input type="checkbox"><span><span class="brand">ナイキ(NIKE)</span><span class="note">Jordan / Dunk / Air Max / ACG。型番タグを見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">ニューバランス(New Balance)</span><span class="note">990 / 991 / 992 / 993 / 2002R。USA/UK製は優先。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">レッドウィング(Red Wing)</span><span class="note">ブーツ。ソール減り・ひび割れ・カビを見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">ドクターマーチン(Dr.Martens)</span><span class="note">8ホール、3ホール。サイズと状態次第。</span></span></label>
        </div>
      </details>
    </section>

    <section>
      <details open>
        <summary>バッグ・財布</summary>
        <div class="items">
          <label><input type="checkbox"><span><span class="brand">ポーター(PORTER)</span><span class="note">タンカー、ヒート、リュック、ショルダーを見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">ブリーフィング(BRIEFING)</span><span class="note">ビジネスバッグ、リュック。黒・ネイビー優先。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">トゥミ(TUMI)</span><span class="note">ビジネスバッグ。持ち手劣化、ファスナーを見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">コーチ(COACH)</span><span class="note">安ければ確認。角スレ、内側汚れに注意。</span></span></label>
        </div>
      </details>
    </section>

    <section>
      <details>
        <summary>スーツケース</summary>
        <div class="items">
          <label><input type="checkbox"><span><span class="brand">無印良品 / 良品計画</span><span class="note">20L / 36L / 75L / 100L。内側タグ、鍵、サイズ、キャスターを見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">リモワ(RIMOWA)</span><span class="note">高単価。へこみ、車輪、ハンドル、ロック、保証書を見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">サムソナイト(Samsonite)</span><span class="note">大型・軽量モデル。キャスター劣化、内装破れ、鍵を見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">エース / プロテカ(ACE / Proteca)</span><span class="note">日本製、軽量、機内持込サイズ。状態良好なら相場確認。</span></span></label>
        </div>
      </details>
    </section>

    <section>
      <details>
        <summary>オーディオ・ヘッドホン</summary>
        <div class="items">
          <label><input type="checkbox"><span><span class="brand">ソニー(SONY)</span><span class="note">WH-1000XM系、Walkman、スピーカー、レコーダー。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">ボーズ(BOSE)</span><span class="note">ヘッドホン、スピーカー。バッテリー劣化に注意。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">デノン(DENON)</span><span class="note">アンプ、CDプレーヤー。リモコン有無を見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">テクニクス(Technics)</span><span class="note">ターンテーブル、オーディオ機器。状態次第で高単価。</span></span></label>
        </div>
      </details>
    </section>

    <section>
      <details>
        <summary>カメラ・レンズ</summary>
        <div class="items">
          <label><input type="checkbox"><span><span class="brand">キヤノン(Canon)</span><span class="note">EOS、EFレンズ、フィルムカメラ。カビ・くもりを見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">ニコン(Nikon)</span><span class="note">Dシリーズ、Fマウントレンズ、フィルムカメラ。AF動作を見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">富士フイルム / ペンタックス</span><span class="note">フィルムカメラは安値なら必ず確認。小さく発送しやすい。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">ソニー / 京セラ</span><span class="note">フィルム・コンパクト系も見る。電池室、レンズ、通電を確認。</span></span></label>
        </div>
      </details>
    </section>

    <section>
      <details>
        <summary>ゲーム</summary>
        <div class="items">
          <label><input type="checkbox"><span><span class="brand">ニンテンドー(Nintendo)</span><span class="note">Switch、3DS、DS、ゲームボーイ。箱付き優先。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">ソニー(SONY)</span><span class="note">PS5 / PS4 / Vita / PSP。動作・付属品を見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">セガ(SEGA)</span><span class="note">サターン、ドリームキャスト、周辺機器。箱説付きを確認。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">マイクロソフト(Microsoft)</span><span class="note">Xbox本体、純正コントローラー。動作と付属品を見る。</span></span></label>
        </div>
      </details>
    </section>

    <section>
      <details>
        <summary>ホビー・フィギュア</summary>
        <div class="items">
          <label><input type="checkbox"><span><span class="brand">バンダイ(BANDAI)</span><span class="note">S.H.Figuarts、METAL BUILD、ガンプラ限定品。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">グッドスマイルカンパニー(Good Smile Company)</span><span class="note">ねんどろいど、figma。未開封・限定を見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">アクスタ・缶バッジ</span><span class="note">鬼滅の刃、人気アニメ、VTuber、歌手、アイドル。限定・コラボ・未開封を見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">レゴ / カトー</span><span class="note">LEGO廃盤、鉄道模型。箱付き、欠品、動作未確認でも相場確認。</span></span></label>
        </div>
      </details>
    </section>

    <section>
      <details>
        <summary>楽器・エフェクター</summary>
        <div class="items">
          <label><input type="checkbox"><span><span class="brand">ボス(BOSS)</span><span class="note">エフェクター全般。古い型番、箱付き優先。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">ローランド(Roland)</span><span class="note">シンセ、リズムマシン、音源。通電確認。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">ヤマハ(YAMAHA)</span><span class="note">シンセ、ミキサー、ギター、管楽器。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">フェンダー(Fender)</span><span class="note">ギター、ベース。ネック反り、フレット、電装を見る。</span></span></label>
        </div>
      </details>
    </section>

    <section>
      <details>
        <summary>化粧品・美容</summary>
        <div class="items">
          <label><input type="checkbox"><span><span class="brand">オージュア(Aujua)</span><span class="note">シャンプー、トリートメント。未使用・残量多めを見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">ケラスターゼ(Kerastase)</span><span class="note">ヘアケア系。業務用、大容量、セット品を確認。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">エスケーツー(SK-II)</span><span class="note">美容液、化粧水、クリーム。未開封・製造時期を見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">オバジ(Obagi)</span><span class="note">美容液、ビタミンC系。箱付き、未開封を優先。</span></span></label>
        </div>
      </details>
    </section>

    <section>
      <details>
        <summary>生活家電</summary>
        <div class="items">
          <label><input type="checkbox"><span><span class="brand">ダイソン(Dyson)</span><span class="note">掃除機、ドライヤー。バッテリーと付属品を見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">パナソニック(Panasonic)</span><span class="note">美容家電、炊飯器、食洗機、空気清浄機。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">バルミューダ / デロンギ</span><span class="note">トースター、レンジ、コーヒーメーカー。年式、水垢、動作注意。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">タオルウォーマー</span><span class="note">DAISHINなど。2,000円以下なら確認。網と水受け皿の付属を見る。</span></span></label>
        </div>
      </details>
    </section>

    <section>
      <details>
        <summary>文房具・オフィス用品</summary>
        <div class="items">
          <label><input type="checkbox"><span><span class="brand">DICカラーガイド</span><span class="note">1・2・3、4・5・6などの冊子セット。箱付き、切り取り少なめを見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">PANTONE色見本</span><span class="note">デザイン・印刷系の色見本。版、欠品、色チップ切り取りを確認。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">製図・デザイン用品</span><span class="note">専門職向けで型番があるもの。値引きシール複数枚は確認。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">オフィス専門用品</span><span class="note">一般文具より業務用途を優先。箱・説明書・セット完品を見る。</span></span></label>
        </div>
      </details>
    </section>

    <section>
      <details>
        <summary>家具</summary>
        <div class="items">
          <label><input type="checkbox"><span><span class="brand">カリモク(Karimoku)</span><span class="note">カリモク60、チェア、ソファ、テーブル。型番タグと傷を見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">飛騨産業(HIDA)</span><span class="note">キツツキ、ダイニングチェア、テーブル。ぐらつき・割れを確認。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">ハーマンミラー(Herman Miller)</span><span class="note">アーロンチェア、セイルチェア。昇降・リクライニング・メッシュ破れを見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">カッシーナ / ライフタイム</span><span class="note">Cassinaは正規タグ確認。Lifetime子供用チェアは安値なら相場確認。</span></span></label>
        </div>
      </details>
    </section>

    <section>
      <details>
        <summary>ベビー用品</summary>
        <div class="items">
          <label><input type="checkbox"><span><span class="brand">エルゴベビー(Ergobaby)</span><span class="note">OMNI 360 Cool Air、OMNI Breeze。メッシュ素材、タグ、付属品を見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">ベビービョルン(BabyBjorn)</span><span class="note">Harmonyなどメッシュ素材の高単価モデル。布素材は弱め。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">プーさん6WAYメリー</span><span class="note">選べる回転6WAYジムにへんしんメリー。太陽マークが左上の新型を見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">ベビー用品メッシュ系</span><span class="note">抱っこ紐、バウンサーなど。メッシュ素材は反応、付属品欠品でも利益計算。</span></span></label>
        </div>
      </details>
    </section>

    <section>
      <details>
        <summary>アウトドア</summary>
        <div class="items">
          <label><input type="checkbox"><span><span class="brand">スノーピーク(Snow Peak)</span><span class="note">テーブル、チェア、焚火台、ランタン。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">コールマン(Coleman)</span><span class="note">ランタン、バーナー、限定カラー。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">ヘリノックス(Helinox)</span><span class="note">チェア系。破れ・ポール欠品を見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">モンベル(mont-bell)</span><span class="note">ウェア、寝袋、ザック。状態良ければ確認。</span></span></label>
        </div>
      </details>
    </section>

    <section>
      <details>
        <summary>釣具</summary>
        <div class="items">
          <label><input type="checkbox"><span><span class="brand">シマノ(SHIMANO)</span><span class="note">リール、ロッド。型番と巻き感を見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">ダイワ(DAIWA)</span><span class="note">リール、ロッド。傷より動作を重視。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">アブガルシア(Abu Garcia)</span><span class="note">ベイトリール、ロッド。箱付き優先。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">メガバス(Megabass)</span><span class="note">ルアー、ロッド。廃盤・限定カラーを見る。</span></span></label>
        </div>
      </details>
    </section>

    <section>
      <details>
        <summary>バドミントンラケット</summary>
        <div class="items">
          <label><input type="checkbox"><span><span class="brand">ヨネックス(YONEX)</span><span class="note">アストロクス / ナノフレア / アークセイバー。ひび割れと塗装剥げを見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">リーニン(LI-NING)</span><span class="note">AERONAUT / AXFORCE / TECTONIC。上位モデルなら相場確認。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">ビクター(VICTOR)</span><span class="note">スラスター / ブレイブソード / ジェットスピード。グリップ状態を見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">ミズノ(Mizuno)</span><span class="note">FORTIUS系。軽量・上位モデル、ケース付きなら確認。</span></span></label>
        </div>
      </details>
    </section>

    <section>
      <details>
        <summary>工具</summary>
        <div class="items">
          <label><input type="checkbox"><span><span class="brand">マキタ(Makita)</span><span class="note">18V/40V工具、バッテリー、充電器。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">ハイコーキ(HiKOKI)</span><span class="note">インパクト、丸ノコ、バッテリー系。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">スナップオン(Snap-on)</span><span class="note">工具箱、レンチ、ラチェット。刻印確認。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">ミツトヨ(Mitutoyo)</span><span class="note">測定器。精度・電池・ケースを見る。</span></span></label>
        </div>
      </details>
    </section>

    <section>
      <details>
        <summary>キッチン・食器</summary>
        <div class="items">
          <label><input type="checkbox"><span><span class="brand">ル・クルーゼ(Le Creuset)</span><span class="note">鍋、食器。欠け・焦げ・箱を見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">ストウブ(Staub)</span><span class="note">鍋。サイズ、状態、付属品を確認。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">バカラ(Baccarat)</span><span class="note">グラス。箱付き、欠けなしなら確認。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">ウェッジウッド(Wedgwood)</span><span class="note">カップ、皿セット。シリーズ名を見る。</span></span></label>
        </div>
      </details>
    </section>

    <section>
      <details>
        <summary>電子辞書</summary>
        <div class="items">
          <label><input type="checkbox"><span><span class="brand">カシオ EX-word XD</span><span class="note">XD-SX / XD-SVなど新しめ年式。タッチペン、電池室、液晶を見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">カシオ 7000番台</span><span class="note">外国語モデル。ポルトガル語、ロシア語、フランス語などは高めに売れやすい。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">カシオ 4000番台</span><span class="note">高校生モデル。古い年式は弱いが、新しめで2,000円以下なら確認。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">シャープ Brain</span><span class="note">CASIOより販売価格は低め。安値仕入れなら利益計算する。</span></span></label>
        </div>
      </details>
    </section>

    <section>
      <details>
        <summary>古着</summary>
        <div class="items">
          <label><input type="checkbox"><span><span class="brand">パタゴニア(Patagonia)</span><span class="note">フリース、シェル、ダウン。タグ型番を見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">ノースフェイス(THE NORTH FACE)</span><span class="note">ダウン、マウンパ、フリース。偽物注意。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">バブアー(Barbour)</span><span class="note">オイルドジャケット。臭い・破れを見る。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">リーバイス(Levi's)</span><span class="note">501、ビッグE、USA製、LVC。タグ確認。</span></span></label>
        </div>
      </details>
    </section>

    <section>
      <details>
        <summary>時計</summary>
        <div class="items">
          <label><input type="checkbox"><span><span class="brand">カシオ(CASIO)</span><span class="note">G-SHOCK、限定、ソーラー電波。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">セイコー(SEIKO)</span><span class="note">ダイバーズ、機械式、プロスペックス。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">シチズン(CITIZEN)</span><span class="note">アテッサ、プロマスター。動作確認。</span></span></label>
          <label><input type="checkbox"><span><span class="brand">ハミルトン(Hamilton)</span><span class="note">機械式。箱・保証書付きなら確認。</span></span></label>
        </div>
      </details>
    </section>

    <p id="no-hit" class="no-hit hidden">該当するブランドが見つかりません</p>
  </main>

  <script>
    const search = document.querySelector("#search");
    const refresh = document.querySelector("#refresh");
    const resetBtn = document.querySelector("#reset");
    const updated = document.querySelector("#updated");
    const headerEl = document.querySelector("#header");
    const chipsEl = document.querySelector("#chips");
    const noHit = document.querySelector("#no-hit");
    const sections = [...document.querySelectorAll("section")];
    const dataUpdatedAt = "2026-06-10 19:35";
    const defaultCornerPoints = {
      "ゴルフクラブ": "利益ポイント: ドライバー、フェアウェイウッド、パター、アイアンセット。純正カバー付き、人気シャフト、上位モデルを見る。",
      "スニーカー・靴": "利益ポイント: 限定色、コラボ、USA/UK製、人気サイズ。加水分解、強い臭い、ソール剥がれは避ける。",
      "バッグ・財布": "利益ポイント: リュック、ショルダー、ビジネスバッグ。黒・ネイビー、型番タグ、付属品ありが狙い目。",
      "スーツケース": "利益ポイント: 無印良品は店舗で安く見られやすい。内側の良品計画タグ、鍵、容量、キャスター状態を確認。大型は送料込みで利益計算。",
      "オーディオ・ヘッドホン": "利益ポイント: ノイズキャンセリング、アンプ、CDプレーヤー、ターンテーブル。リモコン付きは強い。",
      "カメラ・レンズ": "利益ポイント: ミラーレス、単焦点、望遠レンズ、アクションカメラ、フィルムカメラ。安いフィルムカメラはメーカーを見て相場確認。",
      "ゲーム": "利益ポイント: 本体、純正コントローラー、箱説付きレトロ、限定版。スティック不良と読込不良を見る。",
      "ホビー・フィギュア": "利益ポイント: 未開封、限定、廃盤、鉄道模型セット、アクスタ、缶バッジ。人気作品・VTuber・アイドル・コラボ限定を見る。",
      "楽器・エフェクター": "利益ポイント: エフェクター、シンセ、MTR、小型音響機器、民族楽器。音出し、ガリ、電池液漏れを見る。",
      "化粧品・美容": "利益ポイント: 機能性シャンプー、美容液、ジェル、クリーム、サロン専売品。未開封・残量多め・セット品を見る。",
      "生活家電": "利益ポイント: 炊飯器は優先度低め。ミキサー、コーヒーメーカー、精米機、美容家電、掃除機、タオルウォーマーを狙う。",
      "文房具・オフィス用品": "利益ポイント: DICカラーガイドなど専門職向け用品。値引き品、箱付き、セット完品、色チップ切り取り少なめを確認。",
      "家具": "利益ポイント: たのメル便を使用しても、なお利益が出る商品しか仕入れない。高単価チェア、ブランド家具、状態良好、搬出しやすいサイズ、子供用チェアの安値品を確認。",
      "ベビー用品": "利益ポイント: メッシュ素材が反応ポイント。Ergobaby OMNI、BabyBjorn Harmony、プーさん6WAYメリー新型。付属品欠品は価格差を見て判断。",
      "アウトドア": "利益ポイント: ランタン、バーナー、チェア、寝袋、小型ギア。テントはベタつき・欠品・送料に注意。",
      "釣具": "利益ポイント: リール、ロッド、ルアー、限定カラー。巻き感、折れ、ガイド割れを見る。",
      "バドミントンラケット": "利益ポイント: 上位モデル、軽量モデル、ケース付き、状態良好品。フレームひび割れは避ける。",
      "工具": "利益ポイント: 18V/40Vバッテリー工具、充電器、測定器、工具箱。バッテリー劣化と軸ブレを見る。",
      "キッチン・食器": "利益ポイント: 高級鍋、ブランド食器、未使用ギフト、箱付きセット。欠け・ヒビ・水垢を見る。",
      "電子辞書": "利益ポイント: CASIO EX-word XDシリーズ中心。SX/SVなど新しめ、7000番台外国語モデル、2,000円以下のBrainも確認。小さく発送しやすい。",
      "古着": "利益ポイント: ダウン、フリース、シェル、デニム、スウェット。型番タグ、サイズ、季節需要を見る。",
      "時計": "利益ポイント: G-SHOCK限定、ソーラー電波、ダイバーズ、機械式、からくり壁掛け時計。キャラ物かつからくり時計は相場確認。"
    };

    // ----- 端末内保存(localStorage) -----
    const KEY_CHECKS = "resale-checks-v1";
    const KEY_MEMOS = "resale-memos-v1";
    const KEY_OPEN = "resale-open-v1";
    const loadStore = (key) => {
      try { return JSON.parse(localStorage.getItem(key)) || {}; } catch { return {}; }
    };
    const saveStore = (key, value) => {
      try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
    };
    let checks = loadStore(KEY_CHECKS);
    let memos = loadStore(KEY_MEMOS);
    let openState = loadStore(KEY_OPEN);

    // 検索用の正規化: 全角英数→半角、カタカナ→ひらがな、小文字化
    const normalize = (text) => text
      .replace(/[Ａ-Ｚａ-ｚ０-９]/g, (ch) => String.fromCharCode(ch.charCodeAt(0) - 0xFEE0))
      .toLowerCase()
      .replace(/[ァ-ヶ]/g, (ch) => String.fromCharCode(ch.charCodeAt(0) - 0x60));

    const updateBadge = (section) => {
      const boxes = [...section.querySelectorAll('input[type="checkbox"]')];
      const done = boxes.filter((b) => b.checked).length;
      const badge = section.querySelector(".count");
      badge.textContent = `${done}/${boxes.length}`;
      badge.classList.toggle("has", done > 0);
    };

    sections.forEach((section) => {
      const details = section.querySelector("details");
      const summaryEl = section.querySelector("summary");
      const items = section.querySelector(".items");
      if (!details || !summaryEl || !items) return;
      const title = summaryEl.textContent.trim();
      section.dataset.title = title;

      // コーナー利益ポイント
      const box = document.createElement("div");
      box.className = "corner-profit";
      box.innerHTML = `
        <p class="corner-profit-title">コーナー利益ポイント</p>
        <div class="corner-profit-body">${defaultCornerPoints[title] || ""}</div>
      `;
      items.prepend(box);

      // チェック済み件数バッジ
      const badge = document.createElement("span");
      badge.className = "count";
      summaryEl.appendChild(badge);

      // チェック状態の復元と保存
      section.querySelectorAll("label").forEach((label) => {
        const brand = label.querySelector(".brand")?.textContent.trim() || "";
        const id = `${title}|${brand}`;
        const cb = label.querySelector('input[type="checkbox"]');
        cb.checked = !!checks[id];
        label.classList.toggle("done", cb.checked);
        cb.addEventListener("change", () => {
          if (cb.checked) checks[id] = true; else delete checks[id];
          saveStore(KEY_CHECKS, checks);
          label.classList.toggle("done", cb.checked);
          updateBadge(section);
        });
      });
      updateBadge(section);

      // コーナーごとのメモ(端末内に自動保存)
      const memo = document.createElement("textarea");
      memo.placeholder = "メモ(この端末だけに保存されます)";
      memo.value = memos[title] || "";
      memo.addEventListener("input", () => {
        memos[title] = memo.value;
        saveStore(KEY_MEMOS, memos);
      });
      items.appendChild(memo);

      // 開閉状態の記憶
      if (title in openState) details.open = !!openState[title];
      details.addEventListener("toggle", () => {
        if (searchActive) return;
        openState[title] = details.open;
        saveStore(KEY_OPEN, openState);
      });

      // コーナーへジャンプするボタン
      const chip = document.createElement("button");
      chip.type = "button";
      chip.className = "chip";
      chip.textContent = title;
      chip.addEventListener("click", () => {
        details.open = true;
        const top = section.getBoundingClientRect().top + window.scrollY - headerEl.offsetHeight - 8;
        window.scrollTo({ top, behavior: "smooth" });
      });
      chipsEl.appendChild(chip);
    });

    updated.textContent = `更新: ${dataUpdatedAt}`;
    refresh.addEventListener("click", () => {
      const url = new URL(location.href);
      url.searchParams.set("v", Date.now().toString());
      location.href = url.toString();
    });

    resetBtn.addEventListener("click", () => {
      if (!confirm("すべてのチェックを外しますか?")) return;
      checks = {};
      saveStore(KEY_CHECKS, checks);
      document.querySelectorAll('input[type="checkbox"]').forEach((cb) => { cb.checked = false; });
      document.querySelectorAll("label.done").forEach((l) => l.classList.remove("done"));
      sections.forEach(updateBadge);
    });

    // ブランド単位の絞り込み検索
    let searchActive = false;
    let openBefore = null;
    search.addEventListener("input", () => {
      const q = normalize(search.value.trim());

      if (q && !searchActive) {
        openBefore = new Map(sections.map((s) => [s, s.querySelector("details").open]));
        searchActive = true;
      }
      if (!q) {
        if (searchActive) {
          sections.forEach((s) => {
            s.classList.remove("hidden");
            s.querySelectorAll("label").forEach((l) => l.classList.remove("hidden"));
            s.querySelector("details").open = openBefore.get(s);
          });
          noHit.classList.add("hidden");
          searchActive = false;
          openBefore = null;
        }
        return;
      }

      let totalHits = 0;
      sections.forEach((s) => {
        const details = s.querySelector("details");
        const titleMatch = normalize(s.dataset.title).includes(q);
        let hits = 0;
        s.querySelectorAll("label").forEach((l) => {
          const match = titleMatch || normalize(l.textContent).includes(q);
          l.classList.toggle("hidden", !match);
          if (match) hits++;
        });
        s.classList.toggle("hidden", hits === 0);
        if (hits > 0) details.open = true;
        totalHits += hits;
      });
      noHit.classList.toggle("hidden", totalHits > 0);
    });
  </script>
</body>
</html>
