<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f766e">
  <meta http-equiv="cache-control" content="no-cache">
  <meta http-equiv="pragma" content="no-cache">
  <title>中古せどり シンプル仕入れリスト</title>
  <style>
    :root {
      --bg: #f5f6f7;
      --card: #fff;
      --ink: #1f2933;
      --muted: #6b7280;
      --line: #dde3ea;
      --accent: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 2;
      background: rgba(245, 246, 247, .96);
      border-bottom: 1px solid var(--line);
      padding: 12px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 20px;
      letter-spacing: 0;
    }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      font-size: 16px;
      background: #fff;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 8px;
    }
    .updated {
      color: var(--muted);
      font-size: 12px;
    }
    button {
      border: 1px solid var(--accent);
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      padding: 8px 10px;
      font-size: 14px;
      font-weight: 800;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 12px;
    }
    section {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    summary {
      cursor: pointer;
      list-style: none;
      padding: 13px 14px;
      font-weight: 800;
      font-size: 17px;
    }
    summary::-webkit-details-marker { display: none; }
    .items {
      border-top: 1px solid var(--line);
      padding: 8px 12px 12px;
    }
    .corner-profit {
      border: 1px solid #cfe8e3;
      border-radius: 8px;
      background: #f1fbf8;
      padding: 10px;
      margin: 2px 0 8px;
    }
    .corner-profit-title {
      color: var(--accent);
      font-size: 13px;
      font-weight: 900;
      margin: 0 0 6px;
    }
    .corner-profit-body {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      font-size: 14px;
      white-space: pre-wrap;
    }
    label {
      display: grid;
      grid-template-columns: 24px 1fr;
      gap: 8px;
      padding: 9px 0;
      border-bottom: 1px solid #edf1f4;
    }
    label:last-child { border-bottom: 0; }
    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin: 2px 0 0;
      accent-color: var(--accent);
    }
    .brand {
      font-weight: 800;
      font-size: 16px;
    }
    .note {
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
    }
    textarea {
      width: 100%;
      min-height: 54px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      font: inherit;
      font-size: 14px;
      background: #fbfcfd;
    }
    textarea::placeholder {
      color: #9aa3ad;
    }
    .hidden { display: none; }
  </style>
</head>

      "化粧品・美容": "利益ポイント: 機能性シャンプー、美容液、ジェル、クリーム、サロン専売品。未開封・残量多め・セット品を見る。",
      "生活家電": "利益ポイント: 炊飯器は優先度低め。ミキサー、コーヒーメーカー、精米機、美容家電、掃除機を狙う。",
      "家具": "利益ポイント: たのメル便を使用しても、なお利益が出る商品しか仕入れない。高単価チェア、ブランド家具、状態良好、搬出しやすいサイズを優先。",
      "アウトドア": "利益ポイント: ランタン、バーナー、チェア、寝袋、小型ギア。テントはベタつき・欠品・送料に注意。",
      "釣具": "利益ポイント: リール、ロッド、ルアー、限定カラー。巻き感、折れ、ガイド割れを見る。",
      "バドミントンラケット": "利益ポイント: 上位モデル、軽量モデル、ケース付き、状態良好品。フレームひび割れは避ける。",
      "工具": "利益ポイント: 18V/40Vバッテリー工具、充電器、測定器、工具箱。バッテリー劣化と軸ブレを見る。",
      "キッチン・食器": "利益ポイント: 高級鍋、ブランド食器、未使用ギフト、箱付きセット。欠け・ヒビ・水垢を見る。",
      "古着": "利益ポイント: ダウン、フリース、シェル、デニム、スウェット。型番タグ、サイズ、季節需要を見る。",
      "時計": "利益ポイント: G-SHOCK限定、ソーラー電波、ダイバーズ、機械式。箱・余りコマ付きは確認。"
    };

    sections.forEach((section) => {
      const title = section.querySelector("summary")?.textContent.trim();
      const items = section.querySelector(".items");
      if (!title || !items) return;
      const box = document.createElement("div");
      box.className = "corner-profit";
      box.innerHTML = `
        <p class="corner-profit-title">コーナー利益ポイント</p>
        <div class="corner-profit-body">${defaultCornerPoints[title] || ""}</div>
      `;
      items.prepend(box);
    });

    updated.textContent = `更新: ${dataUpdatedAt}`;
    refresh.addEventListener("click", () => {
      const url = new URL(location.href);
      url.searchParams.set("v", Date.now().toString());
      location.href = url.toString();
    });

    search.addEventListener("input", () => {
      const q = search.value.trim().toLowerCase();
      sections.forEach((section) => {
        section.classList.toggle("hidden", q && !section.innerText.toLowerCase().includes(q));
      });
    });
  </script>
</body>
</html>
